# cargo-deny configuration for Talon
#
# SCOPE: This file enforces the supply-chain advisory policy described in
# `docs/adr/0001-supply-chain-monitoring.md` (ADR-0001). It blocks the
# build on any advisory that has a known fix path, and explicitly
# tolerates a curated set of advisories that are *upstream-blocked* --
# i.e. they exist in transitive dependencies we do not own and the
# upstream crate (Tauri, plist, GTK3-rs, etc.) has not shipped a fix.
#
# When an upstream crate ships a fix, the `ignore` entry becomes
# unnecessary. cargo-deny will then re-surface the advisory and the CI
# `supply-chain` job will fail. That's the goal: the moment a fix exists
# upstream, we want to know.
#
# The `[licenses]` section below allows a curated set of OSI-approved
# permissive licenses plus a few that are common in transitive deps.
# Note: the `supply-chain` CI job does NOT run `cargo deny check licenses`
# (it runs `advisories` only, per the Makefile); this section is a
# local-only guard. If you want to enforce licenses in CI, add a step
# that runs `cargo deny check licenses` to the supply-chain job.

[advisories]
version = 2

# Fail the build on any advisory at any severity. This includes
# unmaintained-warnings, notices, and sound-unfixable items.
#
# IMPORTANT: When you add a new entry to `ignore` below, you MUST:
#   1. Add a comment naming the upstream crate responsible.
#   2. Add a comment naming the release that should remove the need
#      for the ignore (e.g. "fixed in tauri-utils 2.10+", "removed
#      at GTK4 migration").
#   3. Reference the ADR-0001 in the comment.
yanked = "warn"        # Warn on yanked crates but don't fail
ignore = [
    # ── gtk-rs GTK3 bindings (12 advisories) ────────────────────────
    # The gtk-rs GTK3 bindings (atk, gdk, gtk, etc.) were archived in
    # 2024 in favor of gtk4-rs. Tauri's Linux backend (tao, wry,
    # webkit2gtk-sys) depends on these transitively. No fix is
    # available until Tauri migrates to GTK4. Tracked by ADR-0001.
    # https://github.com/gtk-rs/gtk3-rs/commit/508a69b63a3c5bf73790e0e59101a955847f30d6
    "RUSTSEC-2024-0411", # gdkwayland-sys, fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0412", # gdk,          fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0413", # atk,          fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0414", # gdkx11-sys,   fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0415", # gtk,          fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0416", # atk-sys,      fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0417", # gdkx11,       fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0418", # gdk-sys,      fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0419", # gtk3-macros,  fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0420", # gtk-sys,      fixed at Tauri GTK4 migration (ADR-0001)
    "RUSTSEC-2024-0370", # proc-macro-error, used by glib-macros; fixed at Tauri GTK4 migration (ADR-0001)

    # ── unic-* family (5 advisories) ────────────────────────────────
    # All Unicode crates from https://github.com/open-i18n/rust-unic
    # are unmaintained. They reach us via tauri-utils → urlpattern.
    # urlpattern is currently published at v0.3.0 and pinned; no fix
    # is available until tauri-utils bumps to a urlpattern that
    # either inlines the Unicode tables or uses unicode-* crates.
    # Tracked by ADR-0001.
    "RUSTSEC-2025-0075", # unic-char-range,    fixed when tauri-utils bumps urlpattern past unmaintained unic-* (ADR-0001)
    "RUSTSEC-2025-0080", # unic-common,        fixed when tauri-utils bumps urlpattern past unmaintained unic-* (ADR-0001)
    "RUSTSEC-2025-0081", # unic-char-property, fixed when tauri-utils bumps urlpattern past unmaintained unic-* (ADR-0001)
    "RUSTSEC-2025-0098", # unic-ucd-version,   fixed when tauri-utils bumps urlpattern past unmaintained unic-* (ADR-0001)
    "RUSTSEC-2025-0100", # unic-ucd-ident,     fixed when tauri-utils bumps urlpattern past unmaintained unic-* (ADR-0001)

    # ── quick-xml (2 advisories) ───────────────────────────────────
    # Two DoS advisories in quick-xml 0.39.x. Fixed in 0.41.0, but
    # `plist 1.9.0` (used by Tauri for macOS bundle manifests) pins
    # `quick-xml = "^0.39.2"`. We need plist to either drop the pin
    # or release a version that uses quick-xml 0.41+. Both advisories
    # are DoS-class: they require a malicious XML payload, and our
    # app does not parse untrusted XML in normal operation. Tracked
    # by ADR-0001.
    # https://rustsec.org/advisories/RUSTSEC-2026-0194
    # https://rustsec.org/advisories/RUSTSEC-2026-0195
    "RUSTSEC-2026-0194", # quick-xml DoS via duplicate attribute names; fixed when plist 1.10+ ships (ADR-0001)
    "RUSTSEC-2026-0195", # quick-xml DoS via unbounded namespace declarations; fixed when plist 1.10+ ships (ADR-0001)
]

# [licenses]
# License policy. We allow the standard set of OSI-approved permissive
# licenses plus a few that are common in transitive dependencies. Each
# entry is the SPDX identifier as cargo-deny normalizes it.
#
# When you add a new license, add a comment explaining what crate needs
# it and whether it's transitive or direct. If a transitive dep uses a
# license that downstream projects routinely allow (e.g. MPL-2.0 for
# `webview2-com` via Tauri), include a note about why.
#
# The list below was assembled by running `cargo deny check licenses`
# and adding every normalized SPDX identifier that appeared. To
# regenerate, run `cargo deny check licenses 2>&1 | grep -oE '"[A-Z][A-Za-z0-9.+-]*"' | sort -u`.
[licenses]
version = 2
allow = [
  "MIT",                       # most Rust crates; both direct and transitive
  "Apache-2.0",                # most Rust crates; both direct and transitive
  "Apache-2.0 WITH LLVM-exception",  # wasi, some LLVM crates
  "BSD-3-Clause",              # some transitive deps
  "Unicode-3.0",               # some ICU-adjacent transitive deps
  "Zlib",                      # some transitive deps (e.g. libpng-sys)
  "0BSD",                      # adler2, some transitive deps
  "CC0-1.0",                   # some transitive deps
  "MIT-0",                     # some transitive deps
  "MPL-2.0",                   # webview2-com via Tauri
  "Unlicense",                 # aho-corasick
  "LGPL-2.1-or-later",         # libdbus-sys via Tauri
]
# When you add a new license, add a comment naming the crate that
# needs it and whether it's direct or transitive. If the allow list
# has an entry that no current dep uses, `cargo deny check licenses`
# will emit a `license-not-encountered` warning -- that's a signal to
# either remove the unused entry (preferred) or add a comment
# explaining why we expect it to appear (e.g. for a build-dependency
# cargo-deny's default tree doesn't traverse).
confidence-threshold = 0.8

