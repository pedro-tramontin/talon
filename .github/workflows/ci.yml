name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cross-language build orchestration lives in the Makefile at the
# repo root. CI invokes the same `make fmt`, `make clippy`, `make test`,
# `make audit` targets that local devs use, so there's a single source
# of truth for the actual cargo/pnpm invocations. The only
# workflow-specific step is passing the UI dist between the `ui` job
# (which builds it with pnpm) and the `rust` jobs (which consume it)
# via a workflow artifact -- `needs: [ui]` is for ordering only and
# does NOT share the filesystem.
#
# Supply-chain policy lives in docs/adr/0001-supply-chain-monitoring.md.
# The `supply-chain` job is a blocking check that runs `make audit`
# (pnpm audit + cargo deny) on every PR. New advisories fail the build.
jobs:
  rust:
    name: Rust (${{ matrix.os }})
    needs: [ui]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
      - name: fmt
        run: make fmt
      - name: clippy
        run: make clippy
      - name: test
        run: make test

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm --dir ui install --frozen-lockfile
      - run: pnpm --dir ui test
      - run: pnpm --dir ui build
      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
          if-no-files-found: error
          retention-days: 1

  # Supply-chain audit. See docs/adr/0001-supply-chain-monitoring.md.
  # This job is a blocking check on every PR and push to main. It runs:
  #   - pnpm audit --audit-level=moderate (full tree: prod + dev)
  #   - cargo deny check advisories (with the 18 upstream-blocked
  #     advisories in deny.toml's `ignore` list -- see ADR-0001)
  #   - audit-binary: build the release binary unstripped and scan the
  #     symbol table to confirm none of the build-time-only crates
  #     (dom_query, quick-xml) leaked into the runtime binary. This
  #     is the threat-model guarantee from ADR-0001 "Threat model".
  #
  # The job does NOT need the UI build artifact; it only needs the
  # lockfiles and source.
  supply-chain:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Linux deps (for release build)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: pnpm audit
        run: pnpm --dir ui audit --audit-level=moderate
      - name: cargo deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # `command-arguments` is forwarded to the cargo-deny subcommand
          # (i.e. after `cargo deny`). The `arguments` field would be passed
          # to `cargo deny` itself, where `check advisories` is not valid
          # positional syntax.
          command-arguments: "advisories"
      - name: audit-binary (release-build symbol scan)
        run: make audit-binary
