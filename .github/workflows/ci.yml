name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    # The app crate's tauri::generate_context!() proc macro reads
    # ../ui/dist at expansion time and panics if it's missing. The
    # UI job builds the dist and uploads it as a workflow artifact;
    # this job downloads the artifact before any cargo command runs.
    # (Note: `needs: [ui]` is for ordering only -- it does NOT share
    # the filesystem between jobs. The artifact pass is the only way
    # to get the dist from the UI VM to the Rust VMs.)
    needs: [ui]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm --dir ui install --frozen-lockfile
      - run: pnpm --dir ui test
      - run: pnpm --dir ui build
      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
          if-no-files-found: error
          retention-days: 1
