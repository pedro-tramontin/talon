name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cross-language build orchestration lives in the Makefile at the
# repo root. CI invokes the same `make fmt`, `make clippy`, `make test`
# targets that local devs use, so there's a single source of truth for
# the actual cargo invocations. The only workflow-specific step is
# passing the UI dist between the `ui` job (which builds it with
# pnpm) and the `rust` jobs (which consume it) via a workflow
# artifact -- `needs: [ui]` is for ordering only and does NOT share
# the filesystem.
jobs:
  rust:
    name: Rust (${{ matrix.os }})
    needs: [ui]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev
      - name: Download UI dist
        uses: actions/download-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
      - name: fmt
        run: make fmt
      - name: clippy
        run: make clippy
      - name: test
        run: make test

  ui:
    name: UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - run: pnpm --dir ui install --frozen-lockfile
      - run: pnpm --dir ui test
      - run: pnpm --dir ui build
      - name: Upload UI dist
        uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist
          if-no-files-found: error
          retention-days: 1
