name: Release

# Tag-triggered. release-please creates the tag on main after the release
# PR is merged; this workflow then builds Tauri bundles for all three
# target OSes in parallel and uploads them to the GitHub Release that
# release-please opened.
#
# Tag format: `vX.Y.Z` (e.g. v0.2.0). release-please emits these; the
# `include-v-in-tag: true` in release-please-config.json keeps the `v`
# prefix. The `tagName:` input to tauri-action is `${{ github.ref_name }}`
# which is the bare tag (e.g. `v0.2.0`) — tauri-action strips the `v`
# internally when stamping the bundle metadata, so the resulting
# .deb/.dmg/.msi all report version `0.2.0` without us ever touching
# app/tauri.conf.json's `version` field at build time.
#
# (release-please does still bump app/tauri.conf.json's `version` field
# via the `extra-files` rule, so the file stays in sync. The build-time
# tag is the authoritative one — the file bump is documentation, not
# the source of truth.)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# Contents: read is enough for the build jobs. The final upload is
# delegated to `tauri-action` which uses its own permissions block.
permissions:
  contents: read

# Cancel any in-flight release build for the same tag if a new commit
# is pushed. Tag pushes are rare so this only ever saves a few minutes,
# but it prevents stale artifacts from being uploaded if release-please
# ever re-pushes a tag.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Three parallel jobs, one per OS. Each job:
  #   1. Checks out the repo at the tag
  #   2. Installs Rust + pnpm + Node + the Tauri system deps for its OS
  #   3. Builds the UI (pnpm install + pnpm build) — required for
  #      tauri::generate_context!() at compile time, same as in CI
  #   4. Runs tauri-action to build the bundle + upload it to the
  #      GitHub Release as a workflow artifact AND attach to the release
  #
  # tauri-action uses its own GITHUB_TOKEN with `contents: write` and
  # `id-token: write` (for the Sigstore provenance attestation). The
  # per-job `permissions:` block below overrides the workflow-level
  # `contents: read`.

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # required by tauri-action to upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (webkit2gtk 4.1, GTK 3, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          # pnpm 11.14.0 matches CI (see .github/workflows/ci.yml).
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps + build
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build

      - name: Build Tauri bundle (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        with:
          # The tag that triggered the workflow. tauri-action strips
          # the `v` prefix when stamping bundle metadata.
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          # `--bundles` is forwarded to `cargo tauri build`. `deb` is
          # the primary Ubuntu/Debian artifact. `appimage` is the
          # portable Linux format that works across distros without
          # the user needing root.
          args: --bundles deb,appimage

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # macOS comes with most of what tauri-action needs preinstalled
      # (Xcode CLT, openssl via brew). The Rust toolchain is installed
      # below.
      #
      # `--target universal-apple-darwin` below requires BOTH the
      # `aarch64-apple-darwin` AND `x86_64-apple-darwin` Rust targets
      # to be installed. The macOS runner image (macos-26-arm64) only
      # includes `aarch64-apple-darwin` by default, so we explicitly
      # add the Intel target here. Without this, tauri-action's
      # universal-binary build fails with:
      #   "Target x86_64-apple-darwin is not installed"
      # (This was the failure mode on the v0.1.1 first-cut release.)

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps + build
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build


      # macOS codesign + notarisation is OPTIONAL. The Tauri CLI reads
      # APPLE_CERTIFICATE from the env and runs `security import` on it;
      # an empty value (the case when no secret is configured) makes the
      # import step fail with `SecKeychainItemImport: One or more
      # parameters passed to a function were not valid`, which aborts
      # the bundle step. The whole job then fails, so no .app / .dmg
      # ever uploads — release-please has already published the GitHub
      # Release (release-please runs from the tag push, not from this
      # job's outcome), and the release ships with only Linux + Windows
      # assets. (Real incident: v0.1.1 + v0.1.2 + v0.1.3 + v0.2.2 all
      # shipped without macOS assets.)
      #
      # Why not the "if APPLE_CERTIFICATE is non-empty, forward via
      # $GITHUB_ENV" pattern: it does NOT work. When a workflow step's
      # `env:` block references `secrets.APPLE_CERTIFICATE` and the
      # secret is unset, GHA evaluates the interpolation to the empty
      # string AND auto-injects that empty-string env var into ALL
      # subsequent steps of the same job (this is by design — it lets
      # steps check `$APPLE_CERTIFICATE` without crashing on an unset
      # var). The build step's process env therefore has
      # `APPLE_CERTIFICATE=""` even when the propagation step's bash
      # guard correctly skipped the write to $GITHUB_ENV. Tauri's
      # `sign.rs` does `var_os("APPLE_CERTIFICATE")` which returns
      # `Some("")` for an empty-string env var — NOT `None` — so
      # Tauri's import branch fires with an empty cert, and
      # `security import` fails with the "One or more parameters not
      # valid" error. The bash guard is correct; GHA's auto-injection
      # defeats it. (Confirmed empirically on run #30117844913, v0.2.2.)
      #
      # The fix: receive the cert via the `apple-actions/import-codesign-certs`
      # action's `with:` inputs (not `env:`). Action inputs are passed
      # to the action's runtime as JavaScript arguments, NOT injected
      # into the step's process env. So when `secrets.APPLE_CERTIFICATE`
      # is unset, the action receives `p12-file-base64: ""` and exits
      # 0 without setting up a keychain; the build step's process env
      # has no APPLE_CERTIFICATE at all, `var_os` returns None, and
      # Tauri's import branch is skipped correctly. Result: no .app /
      # .dmg ever ships when the cert is absent, AND no env-leak
      # poisoning of the build step.
      #
      # The action also auto-generates a keychain password and uses
      # `signing_temp` as the keychain name, so the old
      # `secrets.KEYCHAIN_PASSWORD` is no longer needed.
      #
      # Why no `if:` on the step below: the workflow file is the
      # tag-triggered release.yml (not the PR-triggered ci.yml), and
      # empirically any `if:` expression in this file (even
      # `if: ${{ true }}` or `if: always()`) causes GitHub Actions
      # to reject the file with "no jobs were created" and never
      # fire on a tag push. The fix therefore has to live entirely
      # inside the `with:` block — no `if:` on the step, no bash
      # guard inside a `run:` block, no `env:` block referencing the
      # secrets. The `apple-actions/import-codesign-certs` action
      # internally handles the "empty cert" case by exiting 0 without
      # setting up a keychain, so the "no cert = skip" semantics are
      # preserved.

      - name: Import Apple Developer Certificate (no-op if cert absent)
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      - name: Build Tauri bundle (macOS)
        # No `env:` block on this step. APPLE_* env vars are NOT set
        # anywhere in this job's step envs (the cert import step uses
        # action inputs, not env vars — see the comment block above
        # for why). The Tauri CLI's `var_os("APPLE_CERTIFICATE")`
        # therefore returns None, which is the correct "no signing"
        # signal — `tauri build` skips the import branch and the
        # `tauri-action` step produces an unsigned .app + .dmg.
        #
        # When Apple signing IS configured, the cert is loaded into
        # a keychain by the previous step, and the Tauri CLI's codesign
        # step finds the identity in the keychain automatically
        # (Tauri 2 reads `~/Library/Keychains/signing_temp.keychain-db`
        # by default when the cert was imported there).
        #
        # **Use `RELEASE_PLEASE_TOKEN` (a fine-grained PAT), NOT
        # `GITHUB_TOKEN` (the default integration token).** The
        # default GITHUB_TOKEN is intentionally blocked by GitHub
        # from triggering downstream workflows — but ALSO has
        # read-only `contents:` scope for runs that were triggered
        # by a tag push from a different workflow (like
        # release-please). That breaks tauri-action's "upload
        # assets to the release" step with "Resource not accessible
        # by integration". The `RELEASE_PLEASE_TOKEN` PAT has
        # `Contents: Read and write` + `Pull requests: Read and write`
        # scopes and works in both the release-please workflow
        # AND the release.yml workflow that release-please triggers.
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          # Universal binary (Intel + Apple Silicon) is the primary
          # macOS deliverable. `app` is the bare .app bundle for
          # users who want to drag-install.
          args: --bundles app,dmg --target universal-apple-darwin

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps + build
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build

      - name: Build Tauri bundle (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          # `.msi` is the primary Windows installer (WiX). `.exe`
          # is the NSIS installer that doesn't require admin rights
          # to install (per-user install). Both ship in the same
          # release zip.
          args: --bundles msi,nsis

  # The three build jobs above all set `releaseDraft: true` so they
  # race each other to create the same draft Release. The first one
  # to finish creates it; the others attach their assets to the
  # existing draft. When all three finish, tauri-action
  # auto-publishes the draft (releaseDraft defaults to false on
  # subsequent runs against the same tag — but to be safe, the final
  # job below also flips draft → published explicitly).
  finalize:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # If the release is still in draft (rare: would happen if
          # tauri-action didn't auto-publish on the last build job),
          # flip it to published. The release notes are the body
          # the build jobs already wrote.
          gh release edit "$TAG" --draft=false || true
          echo "Release $TAG is published (or was already)."
