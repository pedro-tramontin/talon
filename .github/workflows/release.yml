name: Release

# Tag-triggered. release-please creates the tag on main after the release
# PR is merged; this workflow then builds Tauri bundles for all three
# target OSes in parallel and uploads them to the GitHub Release that
# release-please opened.
#
# Tag format: `vX.Y.Z` (e.g. v0.2.0). release-please emits these; the
# `include-v-in-tag: true` in release-please-config.json keeps the `v`
# prefix. The `tagName:` input to tauri-action is `${{ github.ref_name }}`
# which is the bare tag (e.g. `v0.2.0`) — tauri-action strips the `v`
# internally when stamping the bundle metadata, so the resulting
# .deb/.dmg/.msi all report version `0.2.0` without us ever touching
# app/tauri.conf.json's `version` field at build time.
#
# (release-please does still bump app/tauri.conf.json's `version` field
# via the `extra-files` rule, so the file stays in sync. The build-time
# tag is the authoritative one — the file bump is documentation, not
# the source of truth.)

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  # Manual trigger so we can re-run a failed release without
  # delete+re-push-the-tag (which release-please won't recreate).
  # Pass `tag=v0.X.Y` as input when triggering.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.3). If empty, uses the ref_name of the current push."
        required: false
        type: string

# Contents: read is enough for the build jobs. The final upload is
# delegated to `tauri-action` which uses its own permissions block.
permissions:
  contents: read

# Cancel any in-flight release build for the same tag if a new commit
# is pushed. Tag pushes are rare so this only ever saves a few minutes,
# but it prevents stale artifacts from being uploaded if release-please
# ever re-pushes a tag.
concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Three parallel jobs, one per OS. Each job:
  #   1. Checks out the repo at the tag
  #   2. Installs Rust + pnpm + Node + the Tauri system deps for its OS
  #   3. Builds the UI (pnpm install + pnpm build) — required for
  #      tauri::generate_context!() at compile time, same as in CI
  #   4. Runs tauri-action to build the bundle + upload it to the
  #      GitHub Release as a workflow artifact AND attach to the release
  #
  # tauri-action uses its own GITHUB_TOKEN with `contents: write` and
  # `id-token: write` (for the Sigstore provenance attestation). The
  # per-job `permissions:` block below overrides the workflow-level
  # `contents: read`.

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    permissions:
      contents: write  # required by tauri-action to upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps (webkit2gtk 4.1, GTK 3, etc.)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          # pnpm 11.14.0 matches CI (see .github/workflows/ci.yml).
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps + build
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build

      - name: Build Tauri bundle (Linux)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # The tag that triggered the workflow. tauri-action strips
          # the `v` prefix when stamping bundle metadata.
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          # `--bundles` is forwarded to `cargo tauri build`. `deb` is
          # the primary Ubuntu/Debian artifact. `appimage` is the
          # portable Linux format that works across distros without
          # the user needing root.
          args: --bundles deb,appimage

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # macOS comes with most of what tauri-action needs preinstalled
      # (Xcode CLT, openssl via brew). The Rust toolchain is installed
      # below.
      #
      # `--target universal-apple-darwin` below requires BOTH the
      # `aarch64-apple-darwin` AND `x86_64-apple-darwin` Rust targets
      # to be installed. The macOS runner image (macos-26-arm64) only
      # includes `aarch64-apple-darwin` by default, so we explicitly
      # add the Intel target here. Without this, tauri-action's
      # universal-binary build fails with:
      #   "Target x86_64-apple-darwin is not installed"
      # (This was the failure mode on the v0.1.1 first-cut release.)

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps + build
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build

      # macOS codesign + notarisation is OPTIONAL. The Tauri CLI reads
      # APPLE_CERTIFICATE from the env and runs `security import` on it;
      # an empty value (the case when no secret is configured) makes the
      # import step fail with `SecKeychainItemImport: One or more
      # parameters passed to a function were not valid`, which aborts
      # the bundle step. The whole job then fails, so no .app / .dmg
      # ever uploads — release-please has already published the GitHub
      # Release (release-please runs from the tag push, not from this
      # job's outcome), and the release ships with only Linux + Windows
      # assets. (Real incident: v0.1.1 + v0.1.2 both shipped without
      # macOS assets. See docs/release-process.md §4.3a.)
      #
      # The fix: two mutually-exclusive steps gated by `if:` on the
      # presence of the APPLE_CERTIFICATE **secret** (not the env
      # var — GitHub Actions evaluates `if:` before the step's
      # `env:` block, so `secrets.APPLE_CERTIFICATE != ''` is the
      # correct check). The signed path imports the cert into a
      # build.keychain and then runs tauri-action with the APPLE_*
      # env vars set. The unsigned path runs tauri-action with NO
      # APPLE_* env vars at all (separate `env:` block — GitHub
      # Actions cannot conditionally clear individual env vars
      # within a single step, so two steps is the only correct way
      # to get a "no APPLE_* vars on the runner" tauri-action
      # invocation).
      #
      # Result:
      #   * No APPLE_CERTIFICATE secret  -> unsigned .app + .dmg ship
      #   * APPLE_CERTIFICATE secret set -> signed + notarised .app + .dmg
      #
      # (Reference: Tauri 2 macOS signing docs use the same
      # keychain-import-as-separate-step pattern. The step ordering
      # matters — `security import` must succeed before `tauri build`,
      # which is why the import is its own step rather than a bash
      # prelude in the build step.)

      - name: Import Apple Developer Certificate
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          echo "=== Signed macOS build: importing Apple Developer Certificate ==="
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import certificate.p12 \
            -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          echo "Certificate imported. Running tauri-action..."

      - name: Build Tauri bundle (macOS, signed) — tauri-action
        if: ${{ secrets.APPLE_CERTIFICATE != '' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          args: --bundles app,dmg --target universal-apple-darwin

      - name: Build Tauri bundle (macOS, unsigned)
        if: ${{ secrets.APPLE_CERTIFICATE == '' }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Deliberately NO APPLE_* env vars — Tauri 2 reads them at
          # bundle time and would call `security import` on an empty
          # value, which fails with SecKeychainItemImport. See the
          # long comment block above + docs/release-process.md §4.3a.
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          # Universal binary (Intel + Apple Silicon) is the primary
          # macOS deliverable. `app` is the bare .app bundle for
          # users who want to drag-install.
          args: --bundles app,dmg --target universal-apple-darwin

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2

      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps + build
        run: pnpm --dir ui install --frozen-lockfile && pnpm --dir ui build

      - name: Build Tauri bundle (Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Talon ${{ github.ref_name }}"
          releaseBody: "See [CHANGELOG.md](https://github.com/pedro-tramontin/talon/blob/${{ github.ref_name }}/CHANGELOG.md) for the full release notes."
          releaseDraft: true
          prerelease: false
          # `.msi` is the primary Windows installer (WiX). `.exe`
          # is the NSIS installer that doesn't require admin rights
          # to install (per-user install). Both ship in the same
          # release zip.
          args: --bundles msi,nsis

  # The three build jobs above all set `releaseDraft: true` so they
  # race each other to create the same draft Release. The first one
  # to finish creates it; the others attach their assets to the
  # existing draft. When all three finish, tauri-action
  # auto-publishes the draft (releaseDraft defaults to false on
  # subsequent runs against the same tag — but to be safe, the final
  # job below also flips draft → published explicitly).
  finalize:
    name: Publish Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          # If the release is still in draft (rare: would happen if
          # tauri-action didn't auto-publish on the last build job),
          # flip it to published. The release notes are the body
          # the build jobs already wrote.
          gh release edit "$TAG" --draft=false || true
          echo "Release $TAG is published (or was already)."
